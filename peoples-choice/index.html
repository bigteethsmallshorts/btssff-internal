<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>People's Choice · BTSSFF</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #D0202A;
    --dark: #1a1a1a;
    --mid: #2e2e2e;
    --surface: #242424;
    --border: #3a3a3a;
    --text: #f0f0f0;
    --muted: #999;
    --gold: #F5C842;
    --silver: #B0B8C8;
    --bronze: #C47A3A;
    --green: #3abf6e;
    --pts1: #4a90d9;
    --pts2: #7060c8;
    --pts3: #c06080;
  }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* HEADER */
  .site-header {
    background: var(--red);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 3px solid #000;
  }
  .site-header h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 28px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    color: #fff;
  }
  .site-header span {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
  }
  .header-count {
    margin-left: auto;
    background: rgba(0,0,0,0.3);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 13px;
    font-weight: 600;
    color: #fff;
  }

  /* NAV TABS */
  .tabs {
    display: flex;
    background: var(--mid);
    border-bottom: 2px solid var(--border);
  }
  .tab-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 12px 22px;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--red); border-bottom-color: var(--red); }

  /* PANELS */
  .panel { display: none; }
  .panel.active { display: block; }

  /* ── ENTRY PANEL ── */
  .entry-layout {
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 0;
    height: calc(100vh - 100px);
  }

  .films-area {
    overflow-y: auto;
    padding: 20px 24px;
    border-right: 1px solid var(--border);
  }

  .category-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 13px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--red);
    padding: 6px 10px 6px 10px;
    background: rgba(208,32,42,0.1);
    border-left: 3px solid var(--red);
    margin-bottom: 10px;
    margin-top: 18px;
  }
  .category-label:first-child { margin-top: 0; }

  .film-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 6px;
  }

  .film-btn {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    overflow: hidden;
    transition: border-color 0.12s, transform 0.08s;
    position: relative;
  }
  .film-btn:hover { border-color: #666; transform: translateY(-1px); }
  .film-btn.rank-1 { border-color: var(--gold); background: rgba(245,200,66,0.07); }
  .film-btn.rank-2 { border-color: var(--silver); background: rgba(176,184,200,0.07); }
  .film-btn.rank-3 { border-color: var(--bronze); background: rgba(196,122,58,0.07); }

  .film-rank-picker {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    flex-shrink: 0;
  }
  .rank-pip {
    width: 32px;
    flex: 1;
    min-height: 20px;
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 13px;
    color: var(--muted);
    transition: background 0.1s, color 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 1px solid var(--border);
  }
  .rank-pip:last-child { border-bottom: none; }
  .rank-pip:hover { background: rgba(255,255,255,0.07); color: var(--text); }
  .rank-pip.active-1 { background: var(--gold); color: #000; }
  .rank-pip.active-2 { background: var(--silver); color: #000; }
  .rank-pip.active-3 { background: var(--bronze); color: #000; }

  .film-info {
    padding: 7px 10px;
    flex: 1;
    text-align: left;
    min-width: 0;
  }
  .film-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 14px;
    line-height: 1.2;
    color: var(--text);
    display: block;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .film-prog {
    font-size: 11px;
    color: var(--muted);
    display: block;
    margin-top: 1px;
  }
  .film-score {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 18px;
    padding-right: 10px;
    color: var(--muted);
    flex-shrink: 0;
    min-width: 36px;
    text-align: right;
  }
  .film-score.has-pts { color: var(--gold); }

  /* Sidebar */
  .sidebar {
    background: var(--mid);
    padding: 20px 18px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .sidebar-section-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .sidebar input, .sidebar textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    padding: 8px 10px;
    transition: border-color 0.12s;
    resize: vertical;
  }
  .sidebar input:focus, .sidebar textarea:focus {
    outline: none;
    border-color: var(--red);
  }
  .sidebar textarea { min-height: 80px; }

  .selection-summary {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
  }
  .sel-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
    border-bottom: 1px solid var(--border);
  }
  .sel-row:last-child { border-bottom: none; }
  .sel-medal {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 13px;
    width: 28px;
    text-align: center;
    flex-shrink: 0;
  }
  .sel-film { font-size: 13px; color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sel-pts { font-size: 11px; color: var(--muted); flex-shrink: 0; }
  .sel-clear { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 16px; padding: 0 2px; line-height: 1; }
  .sel-clear:hover { color: var(--red); }
  .sel-empty { font-size: 13px; color: var(--muted); text-align: center; padding: 8px 0; }

  .btn-submit {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 18px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 14px 20px;
    cursor: pointer;
    width: 100%;
    transition: background 0.15s, transform 0.08s;
  }
  .btn-submit:hover { background: #b51a22; transform: translateY(-1px); }
  .btn-submit:active { transform: translateY(0); }
  .btn-submit:disabled { background: #555; cursor: not-allowed; transform: none; }

  .ballot-counter {
    text-align: center;
    font-size: 13px;
    color: var(--muted);
  }
  .ballot-counter strong { color: var(--text); font-size: 22px; font-family: 'Barlow Condensed', sans-serif; font-weight: 900; display: block; }

  /* ── RESULTS PANEL ── */
  .results-area {
    padding: 24px;
    max-width: 960px;
  }

  .results-toolbar {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    align-items: center;
  }

  .btn-action {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 9px 18px;
    border-radius: 6px;
    cursor: pointer;
    border: 1.5px solid;
    transition: all 0.12s;
  }
  .btn-action.primary { background: var(--red); color: #fff; border-color: var(--red); }
  .btn-action.primary:hover { background: #b51a22; border-color: #b51a22; }
  .btn-action.secondary { background: none; color: var(--text); border-color: var(--border); }
  .btn-action.secondary:hover { border-color: var(--text); }
  .btn-action.export { background: none; color: var(--green); border-color: var(--green); }
  .btn-action.export:hover { background: rgba(58,191,110,0.1); }

  .results-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }

  .results-card {
    background: var(--mid);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .results-card-header {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 14px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 10px 16px;
    background: rgba(255,255,255,0.04);
    border-bottom: 1px solid var(--border);
    color: var(--muted);
  }
  .results-card-header span { color: var(--text); }

  .leaderboard-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .leaderboard-row:last-child { border-bottom: none; }
  .lb-rank {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 14px;
    width: 28px;
    flex-shrink: 0;
    text-align: center;
  }
  .lb-name { flex: 1; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .lb-val {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 16px;
    flex-shrink: 0;
  }
  .lb-bar-wrap { flex: 1; background: var(--surface); border-radius: 3px; height: 6px; overflow: hidden; }
  .lb-bar { height: 100%; border-radius: 3px; transition: width 0.4s; }

  .comments-section {
    background: var(--mid);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .comments-section .results-card-header { border-bottom: 1px solid var(--border); }
  .comment-item {
    padding: 12px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 13px;
  }
  .comment-item:last-child { border-bottom: none; }
  .comment-meta { color: var(--muted); font-size: 11px; margin-bottom: 4px; }

  .emails-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 14px 16px;
  }
  .email-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--text);
  }

  .stat-summary {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--mid);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    text-align: center;
  }
  .stat-val {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 32px;
    color: var(--text);
    display: block;
    line-height: 1;
  }
  .stat-lbl {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 4px;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--green);
    color: #000;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.05em;
    padding: 10px 22px;
    border-radius: 30px;
    opacity: 0;
    transition: all 0.25s;
    pointer-events: none;
    z-index: 9999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .no-votes { text-align: center; color: var(--muted); padding: 48px; font-size: 15px; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header class="site-header">
  <div>
    <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:11px;letter-spacing:0.18em;color:rgba(255,255,255,0.65);text-transform:uppercase;margin-bottom:2px">Big Teeth Small Shorts</div>
    <h1>People's Choice</h1>
  </div>
  <span>Ballot Entry Tool</span>
  <div class="header-count" id="headerCount">0 ballots entered</div>
</header>

<nav class="tabs">
  <button class="tab-btn active" onclick="switchTab('entry')">Enter Ballots</button>
  <button class="tab-btn" onclick="switchTab('results')">Results &amp; Export</button>
</nav>

<div id="panel-entry" class="panel active">
  <div class="entry-layout">

    <!-- Films column -->
    <div class="films-area" id="filmsArea">

      <div class="category-label">Micro Shorts</div>
      <div class="film-grid" id="microGrid"></div>

      <div class="category-label" style="margin-top:20px">Small Shorts</div>
      <div class="film-grid" id="smallGrid"></div>

    </div>

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="ballot-counter">
        <strong id="ballotNum">0</strong>
        ballots entered
      </div>

      <div>
        <div class="sidebar-section-label">Current selections</div>
        <div class="selection-summary" id="selSummary">
          <div class="sel-empty" id="selEmpty">No films selected yet</div>
        </div>
      </div>

      <div>
        <div class="sidebar-section-label">Name <span style="color:var(--muted);font-size:10px;text-transform:none;letter-spacing:0">(optional)</span></div>
        <input type="text" id="inputName" placeholder="Attendee name…" autocomplete="off" />
      </div>
      <div>
        <div class="sidebar-section-label">Email <span style="color:var(--muted);font-size:10px;text-transform:none;letter-spacing:0">(optional)</span></div>
        <input type="email" id="inputEmail" placeholder="email@example.com" autocomplete="off" />
      </div>
      <div>
        <div class="sidebar-section-label">Notes / Comments <span style="color:var(--muted);font-size:10px;text-transform:none;letter-spacing:0">(optional)</span></div>
        <textarea id="inputNotes" placeholder="Any festival feedback…"></textarea>
      </div>

      <button class="btn-submit" id="submitBtn" onclick="submitBallot()">Submit Ballot →</button>

      <button class="btn-action secondary" style="font-size:13px;padding:7px 12px;" onclick="clearForm()">Clear form</button>
    </div>
  </div>
</div>

<div id="panel-results" class="panel">
  <div class="results-area">
    <div class="results-toolbar">
      <button class="btn-action primary" onclick="renderResults()">Refresh Results</button>
      <button class="btn-action export" onclick="exportCSV()">Export CSV</button>
      <button class="btn-action secondary" onclick="if(confirm('Delete ALL ballot data? This cannot be undone.')) { ballots=[]; saveBallots(); renderResults(); renderFilmButtons(); updateCount(); }">Clear All Data</button>
    </div>
    <div id="resultsContent"><div class="no-votes">No ballots yet — enter some on the Enter Ballots tab.</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const MICRO_FILMS = [
  { title: 'The Musical Industrial Complex', prog: 2 },
  { title: 'A Cannon Full of Clowns', prog: 7 },
  { title: 'The Taking Tree', prog: 11 },
  { title: 'Chopsticks', prog: 13 },
  { title: 'OSSOBUCO', prog: 20 },
  { title: 'Anxiety', prog: 23 },
  { title: 'Now Boarding RF 1668', prog: 24 },
  { title: 'Taco Tragedy', prog: 26 },
  { title: 'Where Tuna Comes From', prog: 28 },
  { title: 'Swim', prog: 30 },
];

const SMALL_FILMS = [
  { title: 'DUCKS', prog: 1 },
  { title: "GODZILLA'S DAY OFF!", prog: 3 },
  { title: 'One More Spin', prog: 4 },
  { title: 'Gramps', prog: 5 },
  { title: 'On The Clock With Devilish Intentions', prog: 6 },
  { title: 'The Knot Job', prog: 8 },
  { title: 'Lost Track', prog: 9 },
  { title: "Lola's Got the Blues", prog: 10 },
  { title: 'Security', prog: 12 },
  { title: 'My Name is Eduard Brenton', prog: 14 },
  { title: 'The Fangs I\'m After', prog: 15 },
  { title: 'Good Choice, Joseph.', prog: 16 },
  { title: 'Just One Peek', prog: 17 },
  { title: 'To Have and To Hold', prog: 18 },
  { title: 'Are You Still Watching?', prog: 19 },
  { title: 'All Change', prog: 21 },
  { title: 'Breakup Bob', prog: 22 },
  { title: 'Come Home', prog: 25 },
  { title: 'Cracks On The Road', prog: 27 },
  { title: 'L\'Étreinte (The Embrace)', prog: 29 },
  { title: 'Not a Hero by Accident', prog: 31 },
  { title: 'Soccer Mommies', prog: 32 },
  { title: 'Choice', prog: 33 },
];

let ballots = [];
let currentSelections = { 1: null, 2: null, 3: null };
const POINTS = { 1: 3, 2: 2, 3: 1 };
const MEDAL = { 1: '🥇', 2: '🥈', 3: '🥉' };
const MEDAL_LABEL = { 1: '1st', 2: '2nd', 3: '3rd' };

function filmKey(film) {
  return film.title.replace(/[^a-z0-9]/gi, '_').toLowerCase() + '_' + film.prog;
}

// Load from localStorage
function loadBallots() {
  try { ballots = JSON.parse(localStorage.getItem('btssff_ballots') || '[]'); } catch(e) { ballots = []; }
}
function saveBallots() {
  localStorage.setItem('btssff_ballots', JSON.stringify(ballots));
}
loadBallots();

function switchTab(tab) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  event.target.classList.add('active');
  if (tab === 'results') renderResults();
}

function getScore(filmTitle) {
  let pts = 0, first = 0;
  ballots.forEach(b => {
    b.votes.forEach(v => {
      if (v.title === filmTitle) {
        pts += POINTS[v.rank];
        if (v.rank === 1) first++;
      }
    });
  });
  return { pts, first };
}

function renderFilmButtons() {
  renderCategory(document.getElementById('microGrid'), MICRO_FILMS);
  renderCategory(document.getElementById('smallGrid'), SMALL_FILMS);
}

function renderCategory(container, films) {
  container.innerHTML = '';
  films.forEach(film => {
    const key = filmKey(film);
    const score = getScore(film.title);
    const currentRank = Object.keys(currentSelections).find(r => currentSelections[r] === film.title) || null;

    const btn = document.createElement('div');
    btn.className = 'film-btn' + (currentRank ? ' rank-' + currentRank : '');
    btn.dataset.key = key;
    btn.dataset.title = film.title;

    const rankPicker = document.createElement('div');
    rankPicker.className = 'film-rank-picker';
    [1, 2, 3].forEach(r => {
      const pip = document.createElement('button');
      pip.className = 'rank-pip' + (currentRank == r ? ' active-' + r : '');
      pip.textContent = r;
      pip.title = MEDAL_LABEL[r] + ' place ('+POINTS[r]+' pts)';
      pip.onclick = (e) => { e.stopPropagation(); toggleRank(film.title, r); };
      rankPicker.appendChild(pip);
    });

    const info = document.createElement('div');
    info.className = 'film-info';
    info.innerHTML = `<span class="film-name">${film.title}</span><span class="film-prog">#${film.prog} in program</span>`;

    const scoreEl = document.createElement('div');
    scoreEl.className = 'film-score' + (score.pts > 0 ? ' has-pts' : '');
    scoreEl.textContent = score.pts > 0 ? score.pts : '';

    btn.appendChild(rankPicker);
    btn.appendChild(info);
    btn.appendChild(scoreEl);
    container.appendChild(btn);
  });
}

function toggleRank(title, rank) {
  if (currentSelections[rank] === title) {
    currentSelections[rank] = null;
  } else {
    Object.keys(currentSelections).forEach(r => {
      if (currentSelections[r] === title) currentSelections[r] = null;
    });
    currentSelections[rank] = title;
  }
  renderFilmButtons();
  renderSelectionSummary();
}

function renderSelectionSummary() {
  const summary = document.getElementById('selSummary');
  const empty = document.getElementById('selEmpty');
  const hasAny = Object.values(currentSelections).some(v => v !== null);

  if (!hasAny) {
    summary.innerHTML = '<div class="sel-empty" id="selEmpty">No films selected yet</div>';
    return;
  }

  summary.innerHTML = '';
  [1, 2, 3].forEach(r => {
    const title = currentSelections[r];
    const row = document.createElement('div');
    row.className = 'sel-row';
    const medal = document.createElement('span');
    medal.className = 'sel-medal';
    medal.style.color = r === 1 ? 'var(--gold)' : r === 2 ? 'var(--silver)' : 'var(--bronze)';
    medal.textContent = MEDAL_LABEL[r];

    const nameEl = document.createElement('span');
    nameEl.className = 'sel-film';
    nameEl.textContent = title || '—';
    nameEl.style.color = title ? 'var(--text)' : 'var(--muted)';

    const pts = document.createElement('span');
    pts.className = 'sel-pts';
    pts.textContent = title ? POINTS[r] + ' pts' : '';

    const clear = document.createElement('button');
    clear.className = 'sel-clear';
    clear.textContent = '×';
    if (!title) { clear.style.display = 'none'; }
    clear.onclick = () => { currentSelections[r] = null; renderFilmButtons(); renderSelectionSummary(); };

    row.appendChild(medal);
    row.appendChild(nameEl);
    row.appendChild(pts);
    row.appendChild(clear);
    summary.appendChild(row);
  });
}

function submitBallot() {
  const votes = [];
  [1, 2, 3].forEach(r => {
    if (currentSelections[r]) {
      votes.push({ title: currentSelections[r], rank: parseInt(r), pts: POINTS[r] });
    }
  });

  const ballot = {
    id: Date.now(),
    timestamp: new Date().toISOString(),
    votes,
    name: document.getElementById('inputName').value.trim(),
    email: document.getElementById('inputEmail').value.trim(),
    notes: document.getElementById('inputNotes').value.trim(),
  };

  ballots.push(ballot);
  saveBallots();
  clearForm();
  renderFilmButtons();
  updateCount();
  showToast('Ballot #' + ballots.length + ' saved!');
}

function clearForm() {
  currentSelections = { 1: null, 2: null, 3: null };
  document.getElementById('inputName').value = '';
  document.getElementById('inputEmail').value = '';
  document.getElementById('inputNotes').value = '';
  renderFilmButtons();
  renderSelectionSummary();
  document.getElementById('filmsArea').scrollTo({ top: 0, behavior: 'smooth' });
  document.getElementById('inputName').focus();
}

function updateCount() {
  const n = ballots.length;
  document.getElementById('ballotNum').textContent = n;
  document.getElementById('headerCount').textContent = n + (n === 1 ? ' ballot entered' : ' ballots entered');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function renderResults() {
  const el = document.getElementById('resultsContent');
  if (!ballots.length) {
    el.innerHTML = '<div class="no-votes">No ballots yet — enter some on the Enter Ballots tab.</div>';
    return;
  }

  const allFilms = [...MICRO_FILMS, ...SMALL_FILMS];
  const scores = {};
  allFilms.forEach(f => {
    scores[f.title] = { pts: 0, first: 0, second: 0, third: 0 };
  });
  ballots.forEach(b => {
    b.votes.forEach(v => {
      if (!scores[v.title]) scores[v.title] = { pts: 0, first: 0, second: 0, third: 0 };
      scores[v.title].pts += v.pts;
      if (v.rank === 1) scores[v.title].first++;
      if (v.rank === 2) scores[v.title].second++;
      if (v.rank === 3) scores[v.title].third++;
    });
  });

  const byPts = Object.entries(scores).filter(([,s]) => s.pts > 0).sort((a,b) => b[1].pts - a[1].pts);
  const byFirst = Object.entries(scores).filter(([,s]) => s.first > 0).sort((a,b) => b[1].first - a[1].first);
  const maxPts = byPts[0]?.[1].pts || 1;
  const maxFirst = byFirst[0]?.[1].first || 1;

  const emails = ballots.filter(b => b.email).map(b => b.email);
  const comments = ballots.filter(b => b.notes);

  const totalVoters = ballots.length;
  const totalVotes = ballots.reduce((s, b) => s + b.votes.length, 0);

  let html = `
  <div class="stat-summary">
    <div class="stat-card"><span class="stat-val">${totalVoters}</span><div class="stat-lbl">Ballots</div></div>
    <div class="stat-card"><span class="stat-val">${totalVotes}</span><div class="stat-lbl">Total votes cast</div></div>
    <div class="stat-card"><span class="stat-val">${emails.length}</span><div class="stat-lbl">Emails collected</div></div>
    <div class="stat-card"><span class="stat-val">${comments.length}</span><div class="stat-lbl">Comments</div></div>
  </div>

  <div class="results-grid">
    <div class="results-card">
      <div class="results-card-header"><span>Most points</span> · 1st=3pts, 2nd=2pts, 3rd=1pt</div>
      ${byPts.slice(0,15).map(([title, s], i) => `
        <div class="leaderboard-row">
          <span class="lb-rank" style="color:${i===0?'var(--gold)':i===1?'var(--silver)':i===2?'var(--bronze)':'var(--muted)'}">${i+1}</span>
          <span class="lb-name">${title}</span>
          <div class="lb-bar-wrap"><div class="lb-bar" style="width:${Math.round(s.pts/maxPts*100)}%;background:${i===0?'var(--gold)':i===1?'var(--silver)':i===2?'var(--bronze)':'#555'}"></div></div>
          <span class="lb-val" style="color:${i===0?'var(--gold)':i===1?'var(--silver)':i===2?'var(--bronze)':'var(--text)'}">${s.pts}</span>
        </div>`).join('')}
    </div>

    <div class="results-card">
      <div class="results-card-header"><span>Most #1 votes</span></div>
      ${byFirst.slice(0,15).map(([title, s], i) => `
        <div class="leaderboard-row">
          <span class="lb-rank" style="color:${i===0?'var(--gold)':i===1?'var(--silver)':i===2?'var(--bronze)':'var(--muted)'}">${i+1}</span>
          <span class="lb-name">${title}</span>
          <div class="lb-bar-wrap"><div class="lb-bar" style="width:${Math.round(s.first/maxFirst*100)}%;background:${i===0?'var(--gold)':i===1?'var(--silver)':i===2?'var(--bronze)':'#555'}"></div></div>
          <span class="lb-val" style="color:${i===0?'var(--gold)':i===1?'var(--silver)':i===2?'var(--bronze)':'var(--text)'}">${s.first}</span>
        </div>`).join('')}
    </div>
  </div>`;

  if (comments.length) {
    html += `
    <div class="comments-section">
      <div class="results-card-header"><span>Comments</span> · ${comments.length} total</div>
      ${comments.map(b => `
        <div class="comment-item">
          <div class="comment-meta">${b.name || 'Anonymous'}${b.email ? ' · '+b.email : ''} · ${new Date(b.timestamp).toLocaleDateString()}</div>
          <div>${b.notes}</div>
        </div>`).join('')}
    </div>`;
  }

  if (emails.length) {
    html += `
    <div class="results-card" style="margin-bottom:20px">
      <div class="results-card-header"><span>Emails collected</span> · ${emails.length} total</div>
      <div class="emails-grid">
        ${emails.map(e => `<div class="email-chip">${e}</div>`).join('')}
      </div>
    </div>`;
  }

  el.innerHTML = html;
}

function exportCSV() {
  const rows = [];
  rows.push(['Ballot #','Timestamp','Name','Email','1st Place','2nd Place','3rd Place','Notes']);
  ballots.forEach((b, i) => {
    const v = {};
    b.votes.forEach(vt => v[vt.rank] = vt.title);
    rows.push([
      i+1,
      b.timestamp,
      b.name || '',
      b.email || '',
      v[1] || '',
      v[2] || '',
      v[3] || '',
      b.notes || '',
    ]);
  });

  const csv = rows.map(r => r.map(cell => '"' + String(cell).replace(/"/g, '""') + '"').join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'btssff-peoples-choice-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
  showToast('CSV exported!');
}

// Init
renderFilmButtons();
renderSelectionSummary();
updateCount();
document.getElementById('inputName').focus();
</script>
</body>
</html>
